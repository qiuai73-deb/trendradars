# ===== 基础设置 =====
app:
  timezone: "Asia/Shanghai"          # 时区，中国用户不用改
  show_version_update: false          # 关掉版本更新提示，保持页面干净

# ===== 调度：什么时候抓新闻 =====
schedule:
  enabled: true                       # 开启定时调度
  preset: "morning_evening"           # 全天推送 + 晚间当日汇总（推荐）

# ===== 数据源：从哪些平台抓新闻 =====
platforms:
  enabled: true
  sources:
    # —— 国内热榜 ——（不想看的删掉对应那几行即可）
    - id: "toutiao"
      name: "今日头条"
      expected_domain: "toutiao.com"
    - id: "baidu"
      name: "百度热搜"
      expected_domain: "baidu.com"
    - id: "weibo"
      name: "微博"
      expected_domain: "weibo.com"
    - id: "zhihu"
      name: "知乎"
      expected_domain: "zhihu.com"
    - id: "douyin"
      name: "抖音"
      expected_domain: "douyin.com"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
      expected_domain: "bilibili.com"
    - id: "tieba"
      name: "贴吧"
      expected_domain: "baidu.com"
    # —— 财经新闻 ——
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"
    - id: "cls-hot"
      name: "财联社热门"
      expected_domain: "cls.cn"
    # —— 综合新闻 ——
    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"
    - id: "ifeng"
      name: "凤凰网"
      expected_domain: "ifeng.com"

# ===== RSS 订阅（可选，国外资讯） =====
rss:
  enabled: true
  freshness_filter:
    enabled: true                     # 只抓最近的文章
    max_age_days: 1                   # 只抓 1 天内的，避免旧闻刷屏
  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"
    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"
    - id: "reuters"
      name: "路透社"
      url: "https://news.google.com/rss/search?q=site:reuters.com&hl=zh-CN&gl=CN&ceid=US:en"
    - id: "Bloomberg"
      name: "彭博社"
      url: "https://news.google.com/rss/search?q=site:bloomberg.com&hl=zh-CN&gl=CN&ceid=US:en"
     - id: "Wall Street Journal"
      name: "华尔街日报"
      url: "https://news.google.com/rss/search?q=site:wsj.com&hl=zh-CN&gl=CN&ceid=US:en"
      - id: "Financial times"
      name: "金融时报"
      url: "https://news.google.com/rss/search?q=site:ft.com&hl=zh-CN&gl=CN&ceid=US:en" 
      - id: "CNBC"
      name: "CNBC"
      url: "https://news.google.com/rss/search?q=site:CNBC.com&hl=zh-CN&gl=CN&ceid=US:en" 
      - id: "South China Morning Post"
      name: "南华早报"
      url: "https://news.google.com/rss/search?q=site:scmp.com&hl=zh-CN&gl=CN&ceid=US:en" 
      
      

# ===== 报告模式 =====
report:
  mode: "current"                     # current=当前在榜的新闻（推荐）
                                      # daily=当天全部汇总
                                      # incremental=只看新增的
  display_mode: "platform"            # 按关键词分组展示
  rank_threshold: 5                   # 前5名标红高亮
  max_news_per_keyword: 0             # 0=不限制每个关键词显示几条

# ===== 筛选方式 =====
filter:
  method: "keyword"                   # 关键词筛选（免费，不消耗AI额度）
                                      # 改成 "ai" 则用AI智能分类（需配AI_API_KEY）

# ===== 网页上显示哪些区域 =====
display:
  region_order:                       # 页面从上到下的排列顺序
    - hotlist                            # 1. 新增热点
    - new_items                       # 2. 热榜
    - rss                             # 3. RSS订阅
    - standalone                      # 4. 独立展示
    - ai_analysis                     # 5. AI分析
  regions:
    hotlist: true                     # ✅ 显示热榜
    new_items: true                   # ✅ 显示新增热点
    rss: true                         # ✅ 显示RSS
    standalone: false                 # ❌ 关闭独立展示区
    ai_analysis: false                # ❌ 关闭AI分析（没配API Key时必须关）

# ===== 推送通知 =====
notification:
  enabled: false                      # 关闭推送（咱只看网页，不需要通知）

# ===== 数据存储 =====
storage:
  backend: "auto"                     # auto=自动选择（GitHub Actions时用R2远程存储）
  formats:
    sqlite: true                      # ✅ 数据库存储（必须开）
    txt: false                        # ❌ 不生成TXT
    html: true                        # ✅ 生成HTML网页（必须开！这是你的浏览页面）
  local:
    data_dir: "output"
    retention_days: 0                 # 0=永久保留

# ===== AI 功能（没配API Key就关闭） =====
ai_analysis:
  enabled: true                      # ✅ 打开AI分析

ai_translation:
  enabled: false                      # ❌ 关闭AI翻译

# ===== 高级设置 =====
advanced:
  debug: false                        # 关闭调试模式
